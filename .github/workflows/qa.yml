name: QA
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & Lint Identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run typecheck
      - run: npm run lint:identity

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm test
