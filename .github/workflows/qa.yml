name: QA
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm audit --audit-level=high

  typecheck:
    name: Typecheck & Lint Identity
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run typecheck
      - run: npm run lint:identity

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm test

  test-platform-services:
    name: Test (platform services)
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: fee-router
        working-directory: platform/services/fee-router
        run: |
          npm install
          if find src -name '*.spec.ts' -o -name '*.test.ts' 2>/dev/null | grep -q .; then
            npm test
          else
            echo "No test files found in fee-router — skipping"
          fi
      - name: cli-launcher
        working-directory: platform/services/cli-launcher
        run: |
          npm install
          if find src -name '*.spec.ts' -o -name '*.test.ts' 2>/dev/null | grep -q .; then
            npm test
          else
            echo "No test files found in cli-launcher — skipping"
          fi
