name: QA
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & Lint Identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run typecheck
      - run: npm run lint:identity

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm test

  test-platform-services:
    name: Test (platform services)
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: fee-router
        working-directory: platform/services/fee-router
        run: npm install && npm test
      - name: cli-launcher
        working-directory: platform/services/cli-launcher
        run: npm install && npm test
