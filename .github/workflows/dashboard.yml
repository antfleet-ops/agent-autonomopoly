name: Presale Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'memory/presales.jsonl'
      - 'scripts/export-presales.ts'
      - '.github/workflows/dashboard.yml'

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            dashboard/app/package-lock.json

      - name: Install root deps (for tsx + export script)
        run: npm ci

      - name: Export presales.json
        run: node --import tsx scripts/export-presales.ts

      - name: Install dashboard deps
        working-directory: dashboard/app
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard/app
        run: npm run build
        env:
          VITE_PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/app/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
